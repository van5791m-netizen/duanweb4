<!doctype html>
<html lang="vi">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css"
      rel="stylesheet"
      integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB"
      crossorigin="anonymous"
    />
    <link rel="stylesheet" href="./acess/style.css" />

    <title>Dự án trang web 4</title>
  </head>
  <body>
    <h1>Dự án codde4</h1>

    <nav
      class="navbar navbar-expand-lg border border-bottom-3"
      style="background-color: aquamarine"
    >
      <div class="container">
        <a style="margin-right: 20px" href="#"
          ><img src="./icon/icon1.png" alt="logo" class="img-icon"
        /></a>
        <button
          class="navbar-toggler"
          type="button"
          data-bs-toggle="collapse"
          data-bs-target="#navbarSupportedContent"
          aria-controls="navbarSupportedContent"
          aria-expanded="false"
          aria-label="Toggle navigation"
        >
          <span
            ><img
              src="./icon/iconbar.png"
              alt="icobar"
              style="width: 20px; height: auto"
          /></span>
        </button>
        <div class="collapse navbar-collapse" id="navbarSupportedContent">
          <ul class="navbar-nav me-auto mb-2 mb-lg-0">
            <li class="nav-item">
              <a class="nav-link active" aria-current="page" href="#">Home</a>
            </li>
            <li class="nav-item">
              <a class="nav-link" href="#">Link</a>
            </li>
            <li class="nav-item dropdown">
              <a
                class="nav-link dropdown-toggle"
                href="#"
                role="button"
                data-bs-toggle="dropdown"
                aria-expanded="false"
              >
                Dropdown
              </a>
              <ul class="dropdown-menu">
                <li><a class="dropdown-item" href="#">Action</a></li>
                <li><a class="dropdown-item" href="#">Another action</a></li>
                <li><hr class="dropdown-divider" /></li>
                <li>
                  <a class="dropdown-item" href="#">Something else here</a>
                </li>
              </ul>
            </li>
          </ul>
          <div
            class="d-block d-flex flex-column gap-2 flex-md-row"
            style="align-items: stretch"
          >
            <!-- login -->
            <a href="#" class="login me-3">
              <div class="btn btn-danger btn-sm">
                <img
                  src="./icon/login.png"
                  alt="icon-login"
                  width="20px"
                  height="auto"
                />
                <span>Login for here</span>
              </div>
            </a>
            <a href="#" class="login me-3">
              <div class="btn btn-dark btn-sm">
                <img
                  src="./icon/login.png"
                  alt="icon-login"
                  width="20px"
                  height="auto"
                />
                <span>Sigup for here</span>
              </div>
            </a>
          </div>
          <form class="d-flex mt-2 mt-lg-0" role="search">
            <input
              class="form-control me-0"
              type="search"
              placeholder="Search for"
              aria-label="Search"
            />
            <button class="btn btn-outline-success me-0" type="submit">
              <img
                src="./icon/icon-search.png"
                alt="searchicon"
                style="width: 20px; height: auto"
              />
            </button>
          </form>
        </div>
      </div>
    </nav>

    <script
      src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"
      integrity="sha384-FKyoEForCGlyvwx9Hj09JcYn3nv7wiPVlz7YYwJrWVcXK/BmnVDxM+D2scQbITxI"
      crossorigin="anonymous"
    ></script>
  </body>
</html>
